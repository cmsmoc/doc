<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alterar Senha — CMS</title>
  <meta name="theme-color" content="#0D2E5A">
  <link rel="stylesheet" href="css/brand.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background:var(--cms-off); min-height:100vh; display:flex; flex-direction:column; }
    .page-wrap {
      flex:1; display:flex; align-items:center; justify-content:center;
      padding:var(--space-6);
    }
    .card {
      background:white; border-radius:var(--radius-xl);
      padding:var(--space-10); max-width:400px; width:100%;
      box-shadow:var(--shadow-lg); border:1.5px solid var(--cms-border);
    }
    .card-logo { width:140px; margin:0 auto var(--space-6); display:block; }
    .card-title {
      font-family:var(--font-display); font-size:var(--text-2xl);
      font-weight:900; color:var(--cms-navy); margin-bottom:var(--space-2);
      letter-spacing:-0.8px;
    }
    .card-sub { font-size:var(--text-sm); color:var(--cms-muted); margin-bottom:var(--space-8); }
    .back-link {
      display:inline-flex; align-items:center; gap:var(--space-2);
      font-size:var(--text-sm); color:var(--cms-muted); margin-top:var(--space-5);
      cursor:pointer; background:none; border:none; padding:0;
    }
    .back-link:hover { color:var(--cms-navy); }
  </style>
</head>
<body>
  <div id="toast-container" aria-live="polite"></div>
  <nav id="navbar">
    <div class="navbar-brand">
      <img src="https://i.ibb.co/HLG4tvfn/LOGOTIPO-CONSELHO-BRANCO.png" alt="CMS" class="navbar-logo">
    </div>
    <div class="navbar-actions">
      <button class="navbar-btn" onclick="window.location.href='home.html'">← Início</button>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="card">
      <h1 class="card-title">Alterar Senha</h1>
      <p class="card-sub">Informe sua senha atual e defina uma nova.</p>

      <div class="form-group">
        <label class="form-label">Senha atual</label>
        <div class="password-wrapper">
          <input type="password" id="senha-atual" class="form-control" placeholder="Senha atual">
          <span class="password-toggle" onclick="togglePwd('senha-atual',this)">👁</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Nova senha</label>
        <div class="password-wrapper">
          <input type="password" id="senha-nova" class="form-control" placeholder="Mínimo 4 caracteres">
          <span class="password-toggle" onclick="togglePwd('senha-nova',this)">👁</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirmar nova senha</label>
        <input type="password" id="senha-conf" class="form-control" placeholder="Repita a nova senha">
      </div>

      <div id="msg-erro" class="form-error hidden"><span>⚠️</span><span id="msg-texto"></span></div>

      <button id="btn-salvar" class="btn btn-navy btn-full" style="margin-top:var(--space-5);padding:14px" onclick="salvar()">
        Salvar nova senha
      </button>

      <button class="back-link" onclick="window.location.href='home.html'">← Voltar ao início</button>
    </div>
  </div>

  <script src="config/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    Auth.requireAuth();
    UI.init();

    function togglePwd(id, el) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      el.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    async function salvar() {
      const atual = document.getElementById('senha-atual').value.trim();
      const nova  = document.getElementById('senha-nova').value.trim();
      const conf  = document.getElementById('senha-conf').value.trim();

      if (!atual) { erro('Informe a senha atual.'); return; }
      if (!nova || nova.length < 4) { erro('A nova senha deve ter ao menos 4 caracteres.'); return; }
      if (nova !== conf) { erro('As senhas não coincidem.'); return; }

      const btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-spinner"></span> Salvando...';

      const r = await Api.alterarSenha(atual, nova);
      if (r.success) {
        UI.toast('Senha alterada com sucesso!', 'success');
        setTimeout(() => window.location.href = 'home.html', 1500);
      } else {
        btn.disabled = false;
        btn.textContent = 'Salvar nova senha';
        erro(r.message || 'Erro ao alterar senha.');
      }
    }

    function erro(msg) {
      const el = document.getElementById('msg-erro');
      document.getElementById('msg-texto').textContent = msg;
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
