<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comissões e Câmaras — CMS Montes Claros</title>
  <meta name="theme-color" content="#0D2E5A">
  <link rel="manifest" href="pwa/manifest.json">
  <link rel="icon" type="image/png" href="https://i.ibb.co/4g2ZZyGZ/iconcms1.png">
  <link rel="stylesheet" href="css/brand.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --mod-primary: #0D2E5A;
      --mod-accent:  #F5C400;
      --mod-light:   #EFF6FF;
    }
    #navbar { background: var(--mod-primary); }

    .mod-hero {
      background: linear-gradient(135deg, #0D2E5A 0%, #1B4070 100%);
      padding: var(--space-8) var(--space-6) var(--space-6);
      position: relative; overflow: hidden;
    }
    .mod-hero::before {
      content: ''; position: absolute; top: -80px; right: -80px;
      width: 320px; height: 320px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,196,0,.08) 0%, transparent 65%);
    }
    .mod-hero-inner { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; }
    .mod-eyebrow { font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--mod-accent);margin-bottom:var(--space-2); }
    .mod-title { font-family:var(--font-display);font-size:clamp(22px,4vw,32px);font-weight:900;color:white;letter-spacing:-1px; }
    .mod-title em { color:var(--mod-accent);font-style:normal; }
    .mod-subtitle { font-size:var(--text-sm);color:rgba(255,255,255,.55);margin-top:var(--space-2); }

    .page-wrap { max-width: 900px; margin: 0 auto; padding: var(--space-6); }

    /* ── Tabs de tipo ── */
    .tipo-tabs {
      display: flex; gap: var(--space-2); margin-bottom: var(--space-5);
      background: white; border: 1.5px solid var(--cms-border);
      border-radius: var(--radius-lg); padding: var(--space-2);
      overflow-x: auto;
    }
    .tipo-tab {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md); border: none; background: none;
      font-family: var(--font-display); font-size: 11px; font-weight: 700;
      letter-spacing: .5px; text-transform: uppercase;
      color: var(--cms-muted); cursor: pointer;
      transition: all var(--transition-fast); white-space: nowrap;
    }
    .tipo-tab.active { background: var(--mod-primary); color: white; }

    /* ── Lista de comissões ── */
    .comissao-card {
      background: white; border: 1.5px solid var(--cms-border);
      border-radius: var(--radius-xl); overflow: hidden;
      margin-bottom: var(--space-4); cursor: pointer;
      transition: all var(--transition-base);
    }
    .comissao-card:hover { border-color: var(--cms-blue); box-shadow: var(--shadow-md); }
    .comissao-card.expanded { border-color: var(--cms-blue); }

    .comissao-header {
      padding: var(--space-5) var(--space-6);
      display: flex; align-items: flex-start; gap: var(--space-4);
    }
    .comissao-icon-wrap {
      width: 44px; height: 44px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      background: var(--mod-light);
    }
    .comissao-info { flex: 1; min-width: 0; }
    .comissao-sigla {
      font-family: var(--font-display); font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--cms-blue); margin-bottom: 3px;
    }
    .comissao-nome {
      font-family: var(--font-display); font-size: var(--text-base);
      font-weight: 800; color: var(--cms-navy); line-height: 1.3;
    }
    .comissao-meta {
      display: flex; gap: var(--space-3); margin-top: var(--space-2);
      flex-wrap: wrap;
    }
    .comissao-meta-item {
      display: flex; align-items: center; gap: 4px;
      font-size: var(--text-xs); color: var(--cms-muted);
    }
    .comissao-toggle {
      font-size: 18px; color: var(--cms-muted);
      transition: transform var(--transition-fast); flex-shrink: 0;
    }
    .comissao-card.expanded .comissao-toggle { transform: rotate(180deg); }

    /* ── Membros (expandido) ── */
    .comissao-membros {
      border-top: 1.5px solid var(--cms-border);
      padding: var(--space-5) var(--space-6);
      display: none;
    }
    .comissao-card.expanded .comissao-membros { display: block; }

    .membros-titulo {
      font-family: var(--font-display); font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--cms-blue);
      margin-bottom: var(--space-4);
    }

    .membro-item {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--cms-border);
    }
    .membro-item:last-child { border-bottom: none; }
    .membro-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 12px; font-weight: 800;
      color: white; flex-shrink: 0;
    }
    .membro-avatar.coord { background: linear-gradient(135deg, var(--cms-navy), var(--cms-blue)); }
    .membro-avatar.membro{ background: linear-gradient(135deg, var(--cms-blue), #4B9FE1); }
    .membro-info { flex: 1; min-width: 0; }
    .membro-nome {
      font-weight: 700; color: var(--cms-navy); font-size: var(--text-sm);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .membro-funcao {
      font-size: var(--text-xs); color: var(--cms-muted);
    }
    .membro-eu {
      font-family: var(--font-display); font-size: 9px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      background: var(--cms-yellow); color: var(--cms-navy);
      border-radius: var(--radius-full); padding: 2px 7px;
    }

    .comissao-descricao {
      font-size: var(--text-sm); color: var(--cms-muted); line-height: 1.7;
      margin-bottom: var(--space-4);
    }

    /* ── Minhas comissões highlight ── */
    .minhas-comissoes-wrap {
      background: linear-gradient(135deg, var(--mod-primary), #1B4070);
      border-radius: var(--radius-xl); padding: var(--space-5) var(--space-6);
      margin-bottom: var(--space-5);
      display: none;
    }
    .minhas-comissoes-wrap.active { display: block; }
    .minhas-label {
      font-family: var(--font-display); font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--mod-accent);
      margin-bottom: var(--space-3);
    }
    .minhas-chips { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .minha-chip {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      border-radius: var(--radius-full); padding: var(--space-2) var(--space-3);
      font-size: var(--text-xs); color: white; font-weight: 600;
      cursor: pointer; transition: background var(--transition-fast);
    }
    .minha-chip:hover { background: rgba(255,255,255,.2); }
    .minha-chip.coord { border-color: var(--mod-accent); color: var(--mod-accent); }
  </style>
</head>
<body>
  <div id="loading-screen">
    <img src="https://i.ibb.co/HLG4tvfn/LOGOTIPO-CONSELHO-BRANCO.png" alt="CMS" class="loading-logo">
    <div class="loading-spinner"></div>
    <p class="loading-text">Carregando Comissões</p>
  </div>
  <div id="toast-container" aria-live="polite"></div>

  <nav id="navbar">
    <div class="navbar-brand">
      <img src="https://i.ibb.co/HLG4tvfn/LOGOTIPO-CONSELHO-BRANCO.png" alt="CMS" class="navbar-logo">
      <div class="navbar-title">Comissões <span>e Câmaras</span></div>
    </div>
    <div class="navbar-actions">
      <div class="navbar-avatar" id="nav-avatar">--</div>
      <span class="navbar-name" id="nav-user-name"></span>
      <div class="navbar-divider"></div>
      <button class="navbar-btn" onclick="location.href='home.html'">← Início</button>
      <button class="navbar-btn" id="btn-logout">⎋</button>
    </div>
  </nav>

  <div class="mod-hero">
    <div class="mod-hero-inner">
      <p class="mod-eyebrow">Conselho Municipal de Saúde</p>
      <h1 class="mod-title">Comissões e <em>Câmaras Técnicas</em></h1>
      <p class="mod-subtitle">Órgãos assessores permanentes e instâncias de participação especializada</p>
    </div>
  </div>

  <div class="page-wrap">

    <!-- Minhas comissões -->
    <div id="minhas-wrap" class="minhas-comissoes-wrap">
      <p class="minhas-label">Você participa de</p>
      <div class="minhas-chips" id="minhas-chips"></div>
    </div>

    <!-- Tabs de filtro -->
    <div class="tipo-tabs">
      <button class="tipo-tab active" onclick="filtrarTipo('', this)">Todas</button>
      <button class="tipo-tab" onclick="filtrarTipo('camara', this)">Câmaras Técnicas</button>
      <button class="tipo-tab" onclick="filtrarTipo('comissao', this)">Comissões Intersetoriais</button>
      <button class="tipo-tab" onclick="filtrarTipo('transitoria', this)">Transitórias</button>
    </div>

    <!-- Lista -->
    <div id="comissoes-lista"></div>

  </div>

  <script src="config/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/manutencao.js"></script>
  <script>
    let _todasComissoes = [];
    let _minhasIds = new Set();
    let _meuId = '';

    document.addEventListener('DOMContentLoaded', async () => {
      Auth.requireAuth();
      UI.init();
      const session = Auth.getSession();
      UI.setNavUser(session);
      _meuId = session.id;

      const estado = await Manutencao.verificar('comissoes');
      if (estado !== 'ativo') return;

      document.getElementById('btn-logout').addEventListener('click', () => {
        if (confirm('Sair?')) Auth.logout();
      });

      const [comissoes, minhas] = await Promise.all([
        Api.getComissoes(),
        Api.getMinhasComissoes(),
      ]);

      _todasComissoes = comissoes;
      _minhasIds = new Set(minhas.map(c => c.id));

      // Minhas comissões chip bar
      if (minhas.length) {
        const wrap  = document.getElementById('minhas-wrap');
        const chips = document.getElementById('minhas-chips');
        wrap.classList.add('active');
        minhas.forEach(c => {
          const btn = document.createElement('button');
          btn.className = 'minha-chip' + (c.funcao === 'coordenador' ? ' coord' : '');
          btn.textContent = (c.funcao === 'coordenador' ? '⭐ ' : '') + (c.sigla || c.nome.substring(0, 30));
          btn.title = c.nome;
          btn.onclick = () => expandirComissao(c.id);
          chips.appendChild(btn);
        });
      }

      renderComissoes(_todasComissoes);
      UI.hideLoadingScreen();
    });

    function filtrarTipo(tipo, btn) {
      document.querySelectorAll('.tipo-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtradas = tipo ? _todasComissoes.filter(c => c.tipo === tipo) : _todasComissoes;
      renderComissoes(filtradas);
    }

    function renderComissoes(lista) {
      const container = document.getElementById('comissoes-lista');
      container.innerHTML = '';

      if (!lista.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">🏛️</div><p class="empty-title">Nenhuma comissão encontrada</p></div>';
        return;
      }

      lista.forEach((c, i) => {
        const isMinha = _minhasIds.has(c.id);
        const div = document.createElement('div');
        div.className = 'comissao-card' + (isMinha ? ' minha' : '');
        div.dataset.id = c.id;
        div.style.animationDelay = (i * 40) + 'ms';

        const icon = c.tipo === 'camara' ? '🔬' : c.tipo === 'transitoria' ? '⏳' : '🏛️';
        const membrosCount = c.membros?.length || 0;

        div.innerHTML = `
          <div class="comissao-header" onclick="toggleComissao(this.closest('.comissao-card'))">
            <div class="comissao-icon-wrap">${icon}</div>
            <div class="comissao-info">
              ${c.sigla ? `<p class="comissao-sigla">${c.sigla}</p>` : ''}
              <p class="comissao-nome">${c.nome}</p>
              <div class="comissao-meta">
                <span class="comissao-meta-item">👥 ${membrosCount} membro${membrosCount !== 1 ? 's' : ''}</span>
                ${isMinha ? '<span class="comissao-meta-item" style="color:var(--cms-blue);font-weight:700">✓ Você participa</span>' : ''}
              </div>
            </div>
            <span class="comissao-toggle">⌄</span>
          </div>
          <div class="comissao-membros">
            ${c.descricao ? `<p class="comissao-descricao">${c.descricao}</p>` : ''}
            <p class="membros-titulo">Composição</p>
            <div class="membros-lista">
              ${_renderMembros(c.membros || [])}
            </div>
          </div>`;

        container.appendChild(div);
      });
    }

    function _renderMembros(membros) {
      if (!membros.length) return '<p style="color:var(--cms-muted);font-size:13px">Composição não informada.</p>';

      // Coordenador primeiro
      const sorted = [...membros].sort((a, b) => {
        if (a.funcao === 'coordenador') return -1;
        if (b.funcao === 'coordenador') return 1;
        return (a.nome || '').localeCompare(b.nome || '');
      });

      return sorted.map(m => {
        const iniciais = _iniciais(m.nome);
        const isEu     = m.id_cons === _meuId;
        const isCoord  = m.funcao === 'coordenador';
        return `
          <div class="membro-item">
            <div class="membro-avatar ${isCoord ? 'coord' : 'membro'}">${iniciais}</div>
            <div class="membro-info">
              <p class="membro-nome">${m.nome}</p>
              <p class="membro-funcao">${isCoord ? '⭐ Coordenador(a)' : 'Membro'}</p>
            </div>
            ${isEu ? '<span class="membro-eu">Você</span>' : ''}
          </div>`;
      }).join('');
    }

    function toggleComissao(card) {
      const wasExpanded = card.classList.contains('expanded');
      // Fecha todas
      document.querySelectorAll('.comissao-card.expanded').forEach(c => c.classList.remove('expanded'));
      // Abre a clicada (se não estava aberta)
      if (!wasExpanded) card.classList.add('expanded');
    }

    function expandirComissao(id) {
      const card = document.querySelector(`.comissao-card[data-id="${id}"]`);
      if (!card) return;
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      document.querySelectorAll('.comissao-card.expanded').forEach(c => c.classList.remove('expanded'));
      card.classList.add('expanded');
    }

    function _iniciais(nome) {
      if (!nome) return '?';
      const p = nome.trim().split(' ').filter(Boolean);
      return ((p[0]?.[0] || '') + (p[p.length - 1]?.[0] || '')).toUpperCase();
    }
  </script>
</body>
</html>
