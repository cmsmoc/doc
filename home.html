<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Montes Claros</title>
  <meta name="theme-color" content="#0D2E5A">
  <link rel="manifest" href="pwa/manifest.json">
  <link rel="icon" type="image/png" href="https://i.ibb.co/4g2ZZyGZ/iconcms1.png">
  <link rel="apple-touch-icon" href="https://i.ibb.co/4g2ZZyGZ/iconcms1.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="css/brand.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── HOME PAGE ── */
    .home-hero {
      background: var(--cms-navy);
      position: relative;
      overflow: hidden;
      padding: var(--space-10) var(--space-6) var(--space-8);
    }
    .home-hero::before {
      content:'';
      position:absolute; bottom:-80px; right:-80px;
      width:360px; height:360px; border-radius:50%;
      background:radial-gradient(circle,rgba(245,196,0,.12) 0%,transparent 65%);
      pointer-events:none;
    }
    .home-hero-inner { position:relative; z-index:1; max-width:680px; margin:0 auto; }
    .home-hero-logo  { width:180px; margin-bottom:var(--space-6); }
    .home-banner {
      border-radius:var(--radius-md);
      padding:var(--space-3) var(--space-5);
      margin-bottom:var(--space-5);
      font-size:var(--text-sm);
      font-weight:600;
      display:none;
    }
    .home-banner.active { display:flex; align-items:center; gap:var(--space-3); }
    .home-banner.blue   { background:rgba(27,108,181,.25); color:#93C5FD; border:1px solid rgba(27,108,181,.35); }
    .home-banner.green  { background:rgba(30,138,74,.25);  color:#86EFAC; border:1px solid rgba(30,138,74,.35); }
    .home-banner.yellow { background:rgba(245,196,0,.2);   color:#FCD34D; border:1px solid rgba(245,196,0,.3); }
    .home-banner.red    { background:rgba(220,38,38,.25);  color:#FCA5A5; border:1px solid rgba(220,38,38,.35); }

    .home-title {
      font-family:var(--font-display);
      font-size:clamp(26px,5vw,40px);
      font-weight:900;
      color:white;
      line-height:1.1;
      letter-spacing:-1px;
      margin-bottom:var(--space-3);
    }
    .home-title em { color:var(--cms-yellow); font-style:normal; }
    .home-subtitle { font-size:var(--text-sm); color:rgba(255,255,255,.55); line-height:1.7; max-width:420px; }
    .home-user-chip {
      display:inline-flex; align-items:center; gap:var(--space-2);
      background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15);
      border-radius:var(--radius-full);
      padding:var(--space-2) var(--space-4);
      margin-bottom:var(--space-5);
    }
    .home-user-chip span { font-size:var(--text-sm); color:rgba(255,255,255,.8); }
    .home-user-chip .chip-name { font-weight:700; color:white; }
    .home-cover-img {
      width:100%; max-height:220px; object-fit:cover;
      border-radius:var(--radius-lg); margin-top:var(--space-6);
      display:none;
    }
    .home-cover-img.active { display:block; }

    /* ── CONTEÚDO ── */
    .home-content { max-width:680px; margin:0 auto; padding:var(--space-6); }

    /* ── TEXTO LIVRE ── */
    .home-texto-livre {
      background:white;
      border:1.5px solid var(--cms-border);
      border-radius:var(--radius-lg);
      padding:var(--space-6);
      margin-bottom:var(--space-5);
      font-size:var(--text-base);
      color:var(--cms-ink);
      line-height:1.75;
      display:none;
    }
    .home-texto-livre.active { display:block; }

    /* ── ATAS PENDENTES ── */
    .pendentes-section {
      background:white;
      border:2px solid var(--cms-yellow);
      border-radius:var(--radius-lg);
      overflow:hidden;
      margin-bottom:var(--space-5);
      display:none;
    }
    .pendentes-section.active { display:block; }
    .pendentes-header {
      background:var(--cms-yellow);
      padding:var(--space-3) var(--space-5);
      display:flex; align-items:center; gap:var(--space-2);
    }
    .pendentes-header h3 {
      font-family:var(--font-display);
      font-size:var(--text-sm); font-weight:800;
      color:var(--cms-navy);
    }
    .pendente-item {
      padding:var(--space-4) var(--space-5);
      border-bottom:1px solid var(--cms-border);
      display:flex; align-items:center; justify-content:space-between; gap:var(--space-3);
    }
    .pendente-item:last-child { border-bottom:none; }
    .pendente-info { flex:1; }
    .pendente-titulo { font-weight:700; color:var(--cms-navy); font-size:var(--text-sm); }
    .pendente-meta   { font-size:var(--text-xs); color:var(--cms-muted); }

    /* ── MÓDULOS GRID ── */
    .modules-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:var(--space-3);
      margin-bottom:var(--space-5);
    }
    .module-card {
      background:white;
      border:1.5px solid var(--cms-border);
      border-radius:var(--radius-lg);
      padding:var(--space-5) var(--space-4);
      text-align:center;
      cursor:pointer;
      transition:all var(--transition-base);
      text-decoration:none;
      display:flex; flex-direction:column; align-items:center; gap:var(--space-2);
    }
    .module-card:hover {
      border-color:var(--cms-blue);
      box-shadow:var(--shadow-md);
      transform:translateY(-2px);
    }
    .module-icon { font-size:28px; }
    .module-label {
      font-family:var(--font-display);
      font-size:var(--text-xs);
      font-weight:700;
      color:var(--cms-navy);
      letter-spacing:.5px;
    }
    .module-badge {
      background:var(--cms-blue);
      color:white;
      border-radius:var(--radius-full);
      font-size:10px;
      font-weight:700;
      padding:1px 6px;
      min-width:18px;
    }

    /* ── COMUNICADOS ── */
    .comunicados-section { margin-bottom:var(--space-5); }
    .comunicado-card {
      background:white;
      border:1.5px solid var(--cms-border);
      border-radius:var(--radius-lg);
      padding:var(--space-4) var(--space-5);
      margin-bottom:var(--space-3);
      border-left:4px solid var(--cms-blue);
    }
    .comunicado-card.green  { border-left-color:var(--cms-green); }
    .comunicado-card.yellow { border-left-color:var(--cms-yellow); }
    .comunicado-card.red    { border-left-color:#DC2626; }
    .comunicado-titulo { font-weight:700; color:var(--cms-navy); font-size:var(--text-sm); margin-bottom:var(--space-1); }
    .comunicado-texto  { font-size:var(--text-sm); color:var(--cms-muted); line-height:1.6; }

    /* ── POPUP AVISO ── */
    .popup-overlay {
      position:fixed; inset:0;
      background:rgba(13,46,90,.6);
      backdrop-filter:blur(4px);
      z-index:500;
      display:flex; align-items:center; justify-content:center;
      padding:var(--space-6);
      animation:fadeIn .3s ease;
    }
    .popup-box {
      background:white;
      border-radius:var(--radius-xl);
      padding:var(--space-8);
      max-width:420px; width:100%;
      box-shadow:var(--shadow-lg);
    }
    .popup-eyebrow {
      font-family:var(--font-display);
      font-size:var(--text-xs); font-weight:700;
      letter-spacing:2px; text-transform:uppercase;
      color:var(--cms-blue); margin-bottom:var(--space-3);
    }
    .popup-title { font-family:var(--font-display); font-size:var(--text-xl); font-weight:900; color:var(--cms-navy); margin-bottom:var(--space-3); }
    .popup-text  { font-size:var(--text-sm); color:var(--cms-muted); line-height:1.7; margin-bottom:var(--space-6); }
  </style>
</head>
<body>
  <div id="loading-screen">
    <img src="https://i.ibb.co/HLG4tvfn/LOGOTIPO-CONSELHO-BRANCO.png" alt="CMS" class="loading-logo">
    <div class="loading-spinner"></div>
    <p class="loading-text">Carregando</p>
  </div>

  <div id="toast-container" aria-live="polite"></div>
  <div id="offline-banner">
    <span>📶</span>
    <span>Modo offline</span>
  </div>

  <!-- POPUP DE AVISO -->
  <div id="popup-aviso" class="popup-overlay hidden">
    <div class="popup-box">
      <p class="popup-eyebrow">Aviso</p>
      <h2 class="popup-title" id="popup-titulo"></h2>
      <p class="popup-text"  id="popup-texto"></p>
      <button class="btn btn-primary btn-full" onclick="fecharPopup()">Entendi</button>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="navbar-brand">
      <img src="https://i.ibb.co/HLG4tvfn/LOGOTIPO-CONSELHO-BRANCO.png" alt="CMS" class="navbar-logo">
      <div class="navbar-title">CMS <span>Montes Claros</span></div>
    </div>
    <div class="navbar-actions">
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar">--</div>
        <span class="navbar-name" id="nav-user-name"></span>
      </div>
      <div class="navbar-divider"></div>
      <button class="navbar-btn" onclick="window.location.href='change-password.html'" title="Alterar senha">🔑</button>
      <button class="navbar-btn" id="btn-logout" title="Sair">⎋ Sair</button>
    </div>
  </nav>

  <!-- HERO -->
  <div class="home-hero">
    <div class="home-hero-inner">
      <div id="home-banner" class="home-banner"></div>
      <div class="home-user-chip">
        <span>👋</span>
        <span>Olá, <span class="chip-name" id="chip-nome">Conselheiro</span></span>
      </div>
      <h1 class="home-title" id="home-title">Conselho Municipal<br>de <em>Saúde</em></h1>
      <p class="home-subtitle" id="home-subtitle">Montes Claros — MG</p>
      <img id="home-cover" class="home-cover-img" alt="Capa">
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="home-content">

    <!-- ATAS PENDENTES DE APROVAÇÃO -->
    <div id="pendentes-section" class="pendentes-section">
      <div class="pendentes-header">
        <span>⚠️</span>
        <h3>Atas aguardando sua aprovação</h3>
      </div>
      <div id="pendentes-list"></div>
    </div>

    <!-- TEXTO LIVRE CONFIGURÁVEL -->
    <div id="home-texto" class="home-texto-livre"></div>

    <!-- COMUNICADOS (avisos tipo banner) -->
    <div id="comunicados-section" class="comunicados-section"></div>

    <!-- MÓDULOS -->
    <div class="modules-grid" id="modules-grid"></div>

  </div>

  <!-- PWA INSTALL -->
  <div id="install-banner">
    <div class="install-banner-text">
      <img src="https://i.ibb.co/4g2ZZyGZ/iconcms1.png" class="install-banner-icon" alt="">
      <div class="install-banner-info">
        <h4>Instalar CMS Docs</h4>
        <p>Acesso rápido pelo celular</p>
      </div>
    </div>
    <div class="install-banner-actions">
      <button id="btn-install-dismiss" class="btn btn-ghost btn-sm">Agora não</button>
      <button id="btn-install" class="btn btn-primary btn-sm">Instalar</button>
    </div>
  </div>

  <script src="config/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Auth.requireAuth();
      const session = Auth.getSession();
      UI.init();
      UI.setNavUser(session);

      // Nome no chip
      const chipNome = document.getElementById('chip-nome');
      if (chipNome) chipNome.textContent = session.nome.split(' ')[0];

      // Módulos disponíveis por perfil
      const perfil = session.perfil || 'publico';
      const modulos = [
        { label:'Documentos', icon:'📄', href:'index.html',             sempre:true },
        { label:'Atas',       icon:'📋', href:'atas.html',              sempre:true },
        { label:'Reuniões',   icon:'🗓️', href:'reunioes.html',           sempre:true },
        { label:'Meus Docs',  icon:'👤', href:'meus-documentos.html',   sempre:true },
        { label:'Solicitações',icon:'📨',href:'solicitacoes.html',      sempre:true },
        { label:'Diretoria',  icon:'🏛️', href:'diretoria.html',
          perfis:['diretoria','presidente','secretaria','admin'] },
        { label:'Presidente', icon:'⭐', href:'presidente.html',
          perfis:['presidente','secretaria','admin'] },
        { label:'Admin',      icon:'⚙️', href:'admin.html',
          perfis:['secretaria','admin'] },
      ];

      const hierarquia = ['publico','diretoria','presidente','secretaria','admin'];
      const grid = document.getElementById('modules-grid');
      modulos.forEach(m => {
        if (m.perfis) {
          const nivelUser = hierarquia.indexOf(perfil);
          const temAcesso = m.perfis.some(p => hierarquia.indexOf(p) <= nivelUser + 0 && p === perfil ||
                                               hierarquia.indexOf(perfil) >= hierarquia.indexOf(p));
          if (!temAcesso) return;
        }
        const a = document.createElement('a');
        a.className = 'module-card';
        a.href = m.href;
        a.innerHTML = `<span class="module-icon">${m.icon}</span><span class="module-label">${m.label}</span>`;
        grid.appendChild(a);
      });

      // Carrega home config e avisos em paralelo
      const [homeConfig, avisos, atasPendentes] = await Promise.all([
        Api.getHomeConfig().catch(() => ({})),
        Api.getAvisos().catch(() => []),
        Api.getAtasPendentes().catch(() => []),
      ]);

      // Aplica home config
      const titleEl    = document.getElementById('home-title');
      const subtitleEl = document.getElementById('home-subtitle');
      const textoEl    = document.getElementById('home-texto');
      const coverEl    = document.getElementById('home-cover');
      const bannerEl   = document.getElementById('home-banner');

      if (homeConfig.home_titulo)    titleEl.innerHTML    = homeConfig.home_titulo;
      if (homeConfig.home_subtitulo) subtitleEl.textContent = homeConfig.home_subtitulo;
      if (homeConfig.home_texto) {
        textoEl.textContent = homeConfig.home_texto;
        textoEl.classList.add('active');
      }
      if (homeConfig.home_imagem) {
        coverEl.src = homeConfig.home_imagem;
        coverEl.classList.add('active');
      }
      if (homeConfig.home_banner_texto) {
        const cor = homeConfig.home_banner_cor || 'blue';
        bannerEl.textContent = homeConfig.home_banner_texto;
        bannerEl.className = `home-banner active ${cor}`;
      }

      // Avisos
      const popups    = avisos.filter(a => a.tipo === 'popup');
      const banners   = avisos.filter(a => a.tipo === 'banner');

      // Popup (primeiro da lista)
      if (popups.length) {
        const p = popups[0];
        document.getElementById('popup-titulo').textContent = p.titulo;
        document.getElementById('popup-texto').textContent  = p.texto;
        document.getElementById('popup-aviso').classList.remove('hidden');
      }

      // Comunicados (banners)
      const comSec = document.getElementById('comunicados-section');
      banners.forEach(b => {
        const div = document.createElement('div');
        div.className = `comunicado-card ${b.cor || 'blue'}`;
        div.innerHTML = `<div class="comunicado-titulo">${b.titulo}</div>
                         <div class="comunicado-texto">${b.texto}</div>`;
        comSec.appendChild(div);
      });

      // Atas pendentes
      if (atasPendentes.length) {
        const sec  = document.getElementById('pendentes-section');
        const list = document.getElementById('pendentes-list');
        sec.classList.add('active');
        atasPendentes.forEach(ata => {
          const div = document.createElement('div');
          div.className = 'pendente-item';
          div.innerHTML = `
            <div class="pendente-info">
              <div class="pendente-titulo">${ata.numero} — ${ata.tipo}</div>
              <div class="pendente-meta">${ata.data}</div>
            </div>
            <div style="display:flex;gap:8px">
              ${ata.link_pdf ? `<a href="${ata.link_pdf}" target="_blank" class="btn btn-ghost btn-sm">Ver PDF</a>` : ''}
              <button class="btn btn-primary btn-sm" onclick="aprovarAta('${ata.id}',this)">Aprovar ✓</button>
            </div>`;
          list.appendChild(div);
        });
      }

      document.getElementById('btn-logout').addEventListener('click', () => {
        if (confirm('Sair do sistema?')) Auth.logout();
      });

      _initPWAInstall();
      UI.hideLoadingScreen();
      if (!navigator.onLine) UI.setOffline(true);
      window.addEventListener('offline', () => UI.setOffline(true));
      window.addEventListener('online',  () => UI.setOffline(false));
    });

    function fecharPopup() {
      document.getElementById('popup-aviso').classList.add('hidden');
    }

    async function aprovarAta(idAta, btn) {
      btn.disabled = true;
      btn.textContent = '...';
      const r = await Api.aprovarAta(idAta);
      if (r.success) {
        btn.textContent = '✅';
        btn.closest('.pendente-item').style.opacity = '.5';
        UI.toast('Aprovação registrada com sucesso!', 'success');
      } else {
        btn.disabled = false;
        btn.textContent = 'Aprovar ✓';
        UI.toast(r.message || 'Erro ao registrar aprovação.', 'error');
      }
    }

    function _initPWAInstall() {
      let deferred = null;
      const banner = document.getElementById('install-banner');
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault(); deferred = e;
        setTimeout(() => banner?.classList.add('visible'), 4000);
      });
      document.getElementById('btn-install')?.addEventListener('click', async () => {
        if (!deferred) return;
        deferred.prompt();
        const { outcome } = await deferred.userChoice;
        if (outcome === 'accepted') UI.toast('App instalado! 🎉', 'success');
        deferred = null; banner?.classList.remove('visible');
      });
      document.getElementById('btn-install-dismiss')?.addEventListener('click', () => {
        banner?.classList.remove('visible');
      });
    }
  </script>
</body>
</html>
